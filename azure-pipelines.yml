trigger:
  branches:
    include:
    - main

variables:
- name: buildConfiguration
  value: 'Release'

stages:
- stage: __default
  jobs:
  - job: Job
    pool:
      name: 'Default'
      demands:
      - Agent.Name -equals macs-MacBook-Pro
    steps:
    # 1. Build the project from the specific subfolder
    - task: CmdLine@2
      displayName: 'Build Project'
      inputs:
        script: dotnet build --configuration $(buildConfiguration)
        workingDirectory: 'YourProjectSubfolderName' # <--- CHANGE THIS

    # 2. Run tests from the same folder
    - task: CmdLine@2
      displayName: 'Run Tests'
      inputs:
        script: dotnet test --configuration $(buildConfiguration) --no-build
        workingDirectory: 'YourProjectSubfolderName' # <--- CHANGE THIS

    # 3. Publish (Prepare for move/deploy)
    - task: CmdLine@2
      displayName: 'Publish App'
      inputs:
        script: dotnet publish --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)
        workingDirectory: 'YourProjectSubfolderName' # <--- CHANGE THIS

    # 4. Move files to your deployment folder (The "mv/deploy" part)
    - task: CopyFiles@2
      displayName: 'Deploy to Local Folder'
      inputs:
        SourceFolder: '$(Build.ArtifactStagingDirectory)'
        Contents: '**'
        TargetFolder: '/Users/mac/deployments/MovieShop2026'
        CleanTargetFolder: true