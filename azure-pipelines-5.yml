trigger:
  branches:
    include:
    - main

variables:
- name: buildConfiguration
  value: 'Release'
- name: azureServiceConnection
  value: 'Azure subscription 1(208d95e6-0ef5-401c-a183-3e7c067f8805)'
- name: appName
  value: 'MovieShop2026' # Ensure this matches your Azure App Service name

stages:
- stage: Build
  jobs:
  - job: BuildJob
    pool:
      name: 'Default'
      demands:
      - Agent.Name -equals macs-MacBook-Pro
    steps:
    - task: CmdLine@2
      displayName: 'Dotnet Build'
      inputs:
        script: |
          find . -name "*.csproj" -exec dotnet build {} --configuration $(buildConfiguration) \;

    - task: DotNetCoreCLI@2
      displayName: 'Dotnet Publish'
      inputs:
        command: 'publish'
        publishWebProjects: true
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)'
        zipAfterPublish: true

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'

- stage: Deploy
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    pool:
      name: 'Default' # Using your Mac agent for deploy to avoid hosted pool errors
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            displayName: 'Azure App Service Deploy'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              appType: 'webApp'
              appName: '$(appName)'
              package: '$(Pipeline.Workspace)/drop/**/*.zip'