trigger:
- main

variables:
  buildConfiguration: 'Release'
  # Ensure this EXACT name exists in Project Settings -> Service Connections
  azureServiceConnection: 'Azure subscription 1(208d95e6-0ef5-4010-a183-3e7c067f8805)'
  appName: 'MovieShop2026-App' 

stages:
- stage: Build
  jobs:
  - job: BuildJob
    pool:
      name: 'Default'
      demands:
      - Agent.Name -equals macs-MacBook-Pro
    
    steps:
    - script: |
        find . -name "*.csproj" -exec dotnet build {} --configuration $(buildConfiguration) \;
      displayName: 'Dotnet Build'

    - script: |
        dotnet publish **/*.csproj --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)
      displayName: 'Dotnet Publish'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'

- stage: Deploy
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    pool:
      # Changed from 'ubuntu-latest' to 'Azure Pipelines' with vmImage
      name: 'Azure Pipelines'
      vmImage: 'ubuntu-latest'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              appType: 'webApp'
              appName: '$(appName)'
              package: '$(Pipeline.Workspace)/drop/**/*.zip'