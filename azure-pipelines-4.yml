trigger:
- main

variables:
  buildConfiguration: 'Release'
  # Check Project Settings -> Service Connections. 
  # If the name is different, change this line to match it EXACTLY.
  azureServiceConnection: 'Azure subscription 1'
  appName: 'MovieShop2026-App' 

stages:
- stage: Build
  jobs:
  - job: BuildJob
    pool:
      name: 'Default'
      demands:
      - Agent.Name -equals macs-MacBook-Pro
    
    steps:
    - script: |
        find . -name "*.csproj" -exec dotnet build {} --configuration $(buildConfiguration) \;
      displayName: 'Dotnet Build'

    - script: |
        dotnet publish **/*.csproj --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)
      displayName: 'Dotnet Publish'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'

- stage: Deploy
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    pool:
      vmImage: 'ubuntu-latest' # Simplified: removed the 'name' property
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              appType: 'webApp'
              appName: '$(appName)'
              package: '$(Pipeline.Workspace)/drop/**/*.zip'