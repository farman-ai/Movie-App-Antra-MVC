# ASP.NET Core
# Build and test ASP.NET Core projects targeting .NET Core.
trigger:
- main

variables:
  buildConfiguration: 'Release'

stages:
- stage: BuildAndDeploy
  jobs:
  - job: Job
    pool:
      name: 'Default'
      demands:
      - Agent.Name -equals macs-MacBook-Pro
    
    steps:
    # This searches all folders and builds the project automatically
    - script: |
        dotnet build **/*.csproj --configuration $(buildConfiguration)
      displayName: 'dotnet build $(buildConfiguration)'